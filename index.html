<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SarprasCare v2.0 - Sistem Pengaduan Sekolah</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .candy-gradient { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <nav class="candy-gradient shadow-lg text-white sticky top-0 z-50">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <i class="fas fa-tools text-2xl"></i>
                <span class="font-bold text-lg tracking-tight">SarprasCare</span>
            </div>
            <div class="flex space-x-1">
                <button onclick="showPage('home')" class="px-3 py-1.5 rounded-lg hover:bg-white/20 transition text-sm">Home</button>
                <button onclick="showPage('lapor')" class="px-3 py-1.5 rounded-lg hover:bg-white/20 transition text-sm">Lapor</button>
                <button onclick="showPage('admin')" class="px-3 py-1.5 rounded-lg hover:bg-white/20 transition text-sm">Admin</button>
            </div>
        </div>
    </nav>

    <!-- PAGE: HOME -->
    <div id="page-home" class="container mx-auto px-4 mt-8">
        <h2 class="text-xl font-bold text-slate-800 mb-6">Monitoring Laporan</h2>
        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-slate-50 text-slate-500 text-[10px] uppercase font-bold tracking-widest">
                    <tr><th class="px-6 py-4">Item</th><th class="px-6 py-4">Lokasi</th><th class="px-6 py-4">Status</th></tr>
                </thead>
                <tbody id="homeTableBody" class="divide-y divide-slate-50 text-sm">
                    <tr><td colspan="3" class="px-6 py-8 text-center text-slate-400 italic">Memuat data...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- PAGE: LAPOR -->
    <div id="page-lapor" class="hidden container mx-auto px-4 max-w-2xl mt-8 pb-10">
        <div class="bg-white rounded-3xl shadow-xl border border-slate-100 overflow-hidden">
            <div class="candy-gradient p-6 text-white text-center">
                <h2 class="text-xl font-bold">Form Pengaduan Kerusakan</h2>
            </div>
            <form id="formLapor" class="p-8 space-y-6">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Kategori Fasilitas</label>
                    <select id="kategori" name="kategori" onchange="toggleLainnya()" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500">
                        <option value="AC">AC</option>
                        <option value="LCD">LCD Projector</option>
                        <option value="Umum">Sarana Umum</option>
                    </select>
                </div>
                <div id="fieldLainnya" class="hidden">
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Sebutkan Sarana Umum</label>
                    <input type="text" name="item_khusus" placeholder="Misal: Meja, Kursi, Pintu..." class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Gedung</label>
                        <select name="gedung" id="selectGedung" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl"></select>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Lantai</label>
                        <select name="lantai" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl">
                            <option>1</option><option>2</option><option>3</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Nama Ruangan</label>
                    <select name="ruangan" id="selectRuangan" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl"></select>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Keluhan</label>
                    <textarea name="keluhan" rows="3" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl"></textarea>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Foto Bukti</label>
                    <input type="file" id="fileFoto" accept="image/*" class="w-full text-sm file:mr-4 file:py-2 file:px-4 file:rounded-full file:bg-indigo-50 file:text-indigo-700 file:border-0 font-semibold">
                </div>
                <button type="submit" id="btnSubmit" class="w-full candy-gradient text-white font-bold py-4 rounded-2xl shadow-lg transition">Kirim Laporan</button>
            </form>
        </div>
    </div>

    <!-- PAGE: ADMIN -->
    <div id="page-admin" class="hidden container mx-auto px-4 mt-8">
        <h2 class="text-xl font-bold text-slate-800 mb-6 font-bold uppercase tracking-tight">Admin Dashboard</h2>
        <div id="adminContainer" class="space-y-4">
            <!-- Cards of reports for easy update -->
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw7x6SkeFpcELB6sOjHRPw16p-Z1lWJdFxzJL1F0q8wo3w3y47Rd9lFZbeyHWmZJKsE5w/exec";

        function showPage(p) {
            ['home', 'lapor', 'admin'].forEach(id => document.getElementById('page-'+id).classList.toggle('hidden', id !== p));
            if (p === 'home') loadHomeData();
            if (p === 'admin') loadAdminData();
        }

        function toggleLainnya() {
            document.getElementById('fieldLainnya').classList.toggle('hidden', document.getElementById('kategori').value !== 'Umum');
        }

        async function initForm() {
    try {
        // Pastikan SCRIPT_URL sudah benar dan menggunakan HTTPS
        const res = await fetch(SCRIPT_URL + '?action=getSettings');
        const settings = await res.json();
        
        const gSel = document.getElementById('selectGedung');
        const rSel = document.getElementById('selectRuangan');
        
        // Bersihkan dropdown sebelum mengisi
        gSel.innerHTML = '<option value="">-- Pilih Gedung --</option>';
        rSel.innerHTML = '<option value="">-- Pilih Ruangan --</option>';
        
        if (settings.gedung && settings.gedung.length > 0) {
            settings.gedung.forEach(g => gSel.add(new Option(g, g)));
        }
        
        if (settings.ruangan && settings.ruangan.length > 0) {
            settings.ruangan.forEach(r => rSel.add(new Option(r, r)));
        }
        console.log("Dropdown berhasil dimuat");
    } catch (err) {
        console.error("Gagal memuat dropdown:", err);
    }
}

        document.getElementById('formLapor').onsubmit = async function(e) {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            btn.disabled = true; btn.innerText = "Mengunggah...";

            const file = document.getElementById('fileFoto').files[0];
            let fileData = null;
            if (file) {
                const reader = new FileReader();
                fileData = await new Promise(resolve => {
                    reader.onload = e => resolve({
                        base64: e.target.result.split(',')[1],
                        type: file.type,
                        name: file.name
                    });
                    reader.readAsDataURL(file);
                });
            }

            const payload = {
                action: 'addLaporan',
                kategori: this.kategori.value,
                item_khusus: this.item_khusus?.value || '',
                gedung: this.gedung.value,
                lantai: this.lantai.value,
                ruangan: this.ruangan.value,
                keluhan: this.keluhan.value,
                file: fileData
            };

            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
            alert("Laporan Terkirim!");
            this.reset(); btn.disabled = false; btn.innerText = "Kirim Laporan";
        };

        async function loadHomeData() {
            const res = await fetch(SCRIPT_URL + '?action=getLaporan');
            const data = await res.json();
            const body = document.getElementById('homeTableBody');
            body.innerHTML = data.map(d => `<tr><td class="px-6 py-4"><b>${d.item}</b></td><td class="px-6 py-4">${d.lokasi}</td><td class="px-6 py-4"><span class="px-2 py-1 bg-slate-100 rounded text-[10px] font-bold">${d.status}</span></td></tr>`).join('');
        }

        // Initialize
        initForm();
        showPage('home');
    </script>
</body>
</html>
