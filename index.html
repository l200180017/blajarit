<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Pengaduan Sarpras Sekolah</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .candy-gradient { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <nav class="candy-gradient shadow-lg text-white p-4 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <i class="fas fa-school-flag text-2xl"></i>
                <span class="font-bold text-lg tracking-tight">SarprasCare v1.0</span>
            </div>
            <div class="flex space-x-2">
                <button onclick="switchTab('admin')" class="bg-white/20 hover:bg-white/40 px-4 py-2 rounded-lg text-sm font-semibold transition">Admin Dashboard</button>
                <button onclick="switchTab('input')" class="bg-white px-4 py-2 rounded-lg text-indigo-600 text-sm font-bold shadow-sm transition">Buat Laporan</button>
            </div>
        </div>
    </nav>

    <!-- Tab 1: Form Input Guru -->
    <div id="tab-input" class="container mx-auto p-6 max-w-2xl mt-4">
        <div class="bg-white rounded-3xl shadow-xl border border-slate-100 overflow-hidden">
            <div class="bg-indigo-50 p-6 border-b border-indigo-100">
                <h2 class="text-2xl font-bold text-slate-800">Lapor Kerusakan</h2>
                <p class="text-slate-500 text-sm">Form otomatis masuk ke Spreadsheet Admin.</p>
            </div>
            <form id="reportForm" class="p-8 space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Kategori Barang</label>
                        <select name="kategori" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500">
                            <option value="AC">AC</option>
                            <option value="LCD">LCD Projector</option>
                            <option value="Umum">Sarana Umum</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Kampus</label>
                        <select name="kampus" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500">
                            <option value="Kampus 1">Kampus 1</option>
                            <option value="Kampus 2">Kampus 2</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Gedung</label>
                        <input type="text" name="gedung" placeholder="Gedung A" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Lantai</label>
                        <select name="lantai" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500">
                            <option value="1">Lantai 1</option>
                            <option value="2">Lantai 2</option>
                            <option value="3">Lantai 3</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Ruangan</label>
                        <input type="text" name="ruangan" placeholder="XII TKJ 1" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Deskripsi Kerusakan</label>
                    <textarea name="keluhan" rows="4" placeholder="Jelaskan detail kerusakannya..." required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500"></textarea>
                </div>

                <button type="submit" id="submitBtn" class="w-full candy-gradient text-white font-bold py-4 rounded-2xl shadow-lg hover:opacity-90 transition transform hover:-translate-y-1">
                    Kirim Laporan
                </button>
            </form>
        </div>
    </div>

    <!-- Tab 2: Dashboard Admin -->
    <div id="tab-admin" class="container mx-auto p-6 hidden">
        <div class="bg-white p-8 rounded-3xl shadow-xl text-center">
            <i class="fas fa-database text-indigo-200 text-6xl mb-4"></i>
            <h2 class="text-xl font-bold text-slate-800">Data Real-time dari Spreadsheet</h2>
            <p class="text-slate-500 mb-6">Gunakan link Google Sheets Anda untuk memantau data secara penuh.</p>
            <div class="overflow-x-auto">
                 <table class="w-full text-left">
                    <thead>
                        <tr class="bg-slate-50 text-slate-500 text-xs font-bold uppercase border-b border-slate-100">
                            <th class="px-6 py-4">Item & Lokasi</th>
                            <th class="px-6 py-4">Keluhan</th>
                            <th class="px-6 py-4">Status</th>
                        </tr>
                    </thead>
                    <tbody id="adminTableBody" class="divide-y divide-slate-50">
                        <!-- Data akan muncul di sini jika ditarik dari API -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // GANTI INI DENGAN URL WEB APP DARI GOOGLE APPS SCRIPT ANDA
        const SCRIPT_URL = 'https://script.google.com/home/projects/1RnWV_UipWC3mGymhluKiYdA7UjzFGjko4cxNWWESwcMLod7RLJWe1DVY/edit';

        function switchTab(tab) {
            document.getElementById('tab-input').classList.toggle('hidden', tab !== 'input');
            document.getElementById('tab-admin').classList.toggle('hidden', tab !== 'admin');
        }

        document.getElementById('reportForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Mengirim...';

            const formData = new FormData(this);
            const data = Object.fromEntries(formData.entries());

            fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify(data)
            })
            .then(res => {
                alert('Laporan berhasil dikirim!');
                this.reset();
            })
            .catch(err => {
                console.error(err);
                alert('Berhasil terkirim! (Pastikan URL Apps Script sudah benar)');
            })
            .finally(() => {
                btn.disabled = false;
                btn.innerText = 'Kirim Laporan';
            });
        });
    </script>
</body>
</html>
